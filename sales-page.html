<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        .qr-container { display: flex; gap: 20px; }
        .qr-code { text-align: center; }
        .step { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>购买插件</h1>

    <div class="step">
        <h3>1. 选择支付方式</h3>
        <div class="qr-container">
            <div class="qr-code">
                <img src="my-wechat-pay.png" width="200">
                <p>微信支付</p>
            </div>
            <div class="qr-code">
                <img src="my-alipay-qr.jpg" width="200">
                <p>支付宝</p>
            </div>
        </div>
    </div>

    <div class="step">
        <h3>2. 支付后获取激活码</h3>
        <form id="paymentForm">
            <input type="email" placeholder="邮箱地址（用于接收激活码）" required width="180">
            <textarea placeholder="支付备注（订单号/时间）" required width="150"></textarea>
            <button type="submit">提交获取激活码</button>
        </form>
    </div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('您的支付信息已提交，我们将在确认后通过邮箱发送激活码。感谢购买！');
        });
    </script>
</body>
</html>
